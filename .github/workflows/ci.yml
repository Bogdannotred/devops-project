name: CI


on:
  push:
    branches:
      - main
  pull_request:
  
jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Check fromatting 
        run: python -m ruff format app --diff

      - name: Run lint
        run: python -m ruff check app

      - name: Run Tests
        run: python -m pytest app/tests -v

      - name: Build Docker image
        run: docker build -t devops-health-api${{ github.sha }} .